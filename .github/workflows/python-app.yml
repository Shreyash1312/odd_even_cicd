name: Even Odd CI

on:
    push:
        branches: ["main"]

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v3

            - name: Setup Python
              uses: actions/setup-python@v4
              with:
                python-versions: "3.10"
            - name: Install
              run: |
                pip install -r requirements.txt

            - name: Test
              run: pytest